services:
  thygas_db:
    image: postgres:17-alpine
    container_name: thygas_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: thygas_dev
      POSTGRES_USER: gaspar
      POSTGRES_PASSWORD: "@Asdf4880"

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thygas_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

services:
  tibia_db:
    image: postgres:17-alpine
    container_name: tibia_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: tibia_db
      POSTGRES_USER: gaspar
      POSTGRES_PASSWORD: '@Asdf4880'

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tibia_db']
      interval: 10s
      timeout: 5s
      retries: 5

  tibia_db_dev:
    image: postgres:17-alpine
    container_name: tibia_db_dev
    restart: unless-stopped

    environment:
      POSTGRES_DB: tibia_db_dev
      POSTGRES_USER: gaspar
      POSTGRES_PASSWORD: '@Asdf4880'

    ports:
      - '5435:5432'

    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tibia_db_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_data_dev:
